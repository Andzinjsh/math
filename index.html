<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Priecīga Matēmatika – Saskaiti un Atņem!</title>
  <style>
    body {
      font-family: "Comic Sans MS", "Chalkboard SE", sans-serif;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb); /* Sākotnējais fons līmenim 1 */
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      color: #333;
      text-align: center;
      transition: background 0.5s ease;
    }
    .level-2 { background: linear-gradient(135deg, #b2d8b2, #d9f2d9); } /* Zaļš līmenim 2 */
    .level-3 { background: linear-gradient(135deg, #fdfd96, #fffacd); } /* Dzeltens līmenim 3 */
    h1 {
      color: #d81e5b;
      text-shadow: 2px 2px #fff;
      margin: 10px 0 20px;
      font-size: 2.8rem;
    }
    #game {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 480px;
      margin: 0 auto 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    #question {
      font-size: 3.2rem;
      margin: 20px 0;
      color: #2c3e50;
    }
    #feedback-img {
      width: 200px;
      height: 200px;
      margin: 15px 0;
      border-radius: 50%;
      object-fit: cover;
      min-height: 100px;
    }
    input {
      font-size: 2.5rem;
      width: 120px;
      text-align: center;
      padding: 10px;
      border: 4px solid #3498db;
      border-radius: 12px;
      margin: 15px 0;
    }
    button {
      font-size: 1.6rem;
      padding: 12px 30px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #2ecc71;
      color: white;
      font-weight: bold;
    }
    button:hover { background: #27ae60; }
    #new-game {
      background: #e74c3c;
    }
    #new-game:hover { background: #c0392b; }
    #score, #level, #lives {
      font-size: 1.5rem;
      margin: 10px 0;
      color: #8e44ad;
    }
    .correct  { animation: bounce 0.6s; }
    .wrong    { animation: shake 0.5s; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-20px); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-8px); }
      75%     { transform: translateX(8px); }
    }
    #win-message {
      display: none;
      font-size: 2rem;
      color: #2ecc71;
      margin: 20px 0;
    }
  </style>
</head>
<body class="level-1">

  <h1>Jaunais ģēnijs 🎉</h1>

  <div id="game">
    <img id="feedback-img" src="https://via.placeholder.com/200?text=🤔" alt="Feedback">
    <div id="question">?</div>
    <input type="number" id="answer" placeholder="?" min="0" max="18" autofocus>
    <br>
    <button onclick="checkAnswer()">Pārbaudīt ✅</button>
    <button id="new-game" onclick="newGame()">Jauna spēle 🔄</button>

    <div id="lives">Dzīvības: ❤️❤️❤️</div>
    <div id="score">Pareizi: 0 | Nepareizi: 0</div>
    <div id="level">Līmenis: 1 (Pareizi šajā līmenī: 0/5)</div>
    <div id="win-message">Uzvara! Tu esi lielisks matēmatiķis! 🎊</div>
  </div>

  <script>
    let correctCount = 0;
    let wrongCount = 0;
    let level = 1;
    let levelProgress = 0;
    let lives = 3;
    let currentA = 0;
    let currentB = 0;
    let operation = '+'; // Sākumā tikai +

    const happyImages = [
      "https://is1-ssl.mzstatic.com/image/thumb/Purple221/v4/51/95/be/5195be86-c6e0-f3af-ffb8-f78642908e64/AppIcon-0-0-1x_U007emarketing-0-11-85-220.png/1200x630wa.png",
      "https://i.ytimg.com/vi/rEWSKZ-YvqI/maxresdefault.jpg",
      "https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/4b/5f/34/4b5f345b-57d2-deff-745c-fd4b1720f481/AppIcon-0-0-1x_U007epad-0-1-85-220.png/1200x630wa.png"
    ];

    const sadImages = [
      "https://i.ytimg.com/vi/706c5-Ndvi0/maxresdefault.jpg?sqp=-oaymwEmCIAKENAF8quKqQMa8AEB-AH-CYAC0AWKAgwIABABGHIgSSggMA8=&rs=AOn4CLBKGgZDjinMIxSN1hmFH5TjKavdLA",
      "https://is1-ssl.mzstatic.com/image/thumb/Purple211/v4/46/dd/44/46dd44e5-eed6-e366-c674-5c7853ad7b3d/AppIcon-1x_U007emarketing-0-8-0-85-220-0.png/1200x630wa.jpg",
      "https://static.boredpanda.com/blog/wp-content/uploads/2024/05/animal-comics-for-animal-charities-sheri-davies-cover_675.jpg"
    ];

    const neutralImage = "https://via.placeholder.com/200?text=🤔";

    function randomImage(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function updateBodyClass() {
      document.body.className = `level-${level}`;
    }

    function updateLives() {
      let hearts = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
      document.getElementById("lives").textContent = `Dzīvības: ${hearts}`;
    }

    function generateTask() {
      if (level === 1) {
        operation = '+';
        currentA = Math.floor(Math.random() * 9) + 1;
        currentB = Math.floor(Math.random() * (10 - currentA)) + 1;
      } else if (level === 2) {
        operation = '-';
        currentA = Math.floor(Math.random() * 9) + 2;
        currentB = Math.floor(Math.random() * currentA) + 1;
      } else { // level 3: jaukti
        operation = Math.random() < 0.5 ? '+' : '-';
        if (operation === '+') {
          currentA = Math.floor(Math.random() * 9) + 1;
          currentB = Math.floor(Math.random() * (10 - currentA)) + 1;
        } else {
          currentA = Math.floor(Math.random() * 9) + 2;
          currentB = Math.floor(Math.random() * currentA) + 1;
        }
      }

      document.getElementById("question").textContent = `${currentA} ${operation} ${currentB} = `;
      document.getElementById("answer").value = "";
      document.getElementById("answer").focus();
      document.getElementById("feedback-img").src = neutralImage;
      document.getElementById("win-message").style.display = 'none';
    }

    function checkAnswer() {
      const userAns = parseInt(document.getElementById("answer").value);
      let correctAns = operation === '+' ? currentA + currentB : currentA - currentB;

      const imgEl = document.getElementById("feedback-img");
      imgEl.classList.remove("correct", "wrong");

      if (userAns === correctAns) {
        correctCount++;
        levelProgress++;
        imgEl.src = randomImage(happyImages);
        imgEl.classList.add("correct");
        document.getElementById("level").textContent = `Līmenis: ${level} (Pareizi šajā līmenī: ${levelProgress}/5)`;

        if (levelProgress >= 5) {
          level++;
          levelProgress = 0;
          if (level > 3) {
            document.getElementById("win-message").style.display = 'block';
            setTimeout(newGame, 3000); // Restart pēc 3s
            return;
          }
          updateBodyClass();
          document.getElementById("level").textContent = `Līmenis: ${level} (Pareizi šajā līmenī: 0/5)`;
        }
      } else {
        wrongCount++;
        lives--;
        imgEl.src = randomImage(sadImages);
        imgEl.classList.add("wrong");
        updateLives();
        if (lives <= 0) {
          alert("Dzīvības beigušās! Mēģini vēlreiz!");
          newGame();
          return;
        }
      }

      document.getElementById("score").textContent = 
        `Pareizi: ${correctCount} | Nepareizi: ${wrongCount}`;

      setTimeout(generateTask, 1200);
    }

    function newGame() {
      correctCount = 0;
      wrongCount = 0;
      level = 1;
      levelProgress = 0;
      lives = 3;
      updateBodyClass();
      updateLives();
      document.getElementById("score").textContent = "Pareizi: 0 | Nepareizi: 0";
      document.getElementById("level").textContent = "Līmenis: 1 (Pareizi šajā līmenī: 0/5)";
      generateTask();
    }

    // Sākt spēli
    updateLives();
    generateTask();

    // Enter taustiņš arī strādā
    document.getElementById("answer").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        checkAnswer();
      }
    });
  </script>

</body>

</html>
